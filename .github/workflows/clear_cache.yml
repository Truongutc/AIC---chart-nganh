name: Clear Data Cache

on:
  workflow_dispatch: # Enable manual run button in GitHub Actions tab

jobs:
  clear:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Restore Cached Stock Data
        uses: actions/cache@v3
        with:
          path: |
            data_storage/
            config.json
          key: stock-data-clear-${{ github.run_id }}
          restore-keys: |
            stock-data-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Clear Cache
        run: |
          python run_headless_update.py --clear-cache

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the Output/ directory changes (which contains deleted output files)
          git add Output/
          
          if ! git diff --cached --quiet; then
            git commit -m "Clear stock data cache and web output: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit. Skipping push."
          fi
