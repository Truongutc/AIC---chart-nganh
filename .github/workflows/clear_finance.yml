name: Clear Finance

on:
  workflow_dispatch: # Xóa kết quả tính toán ROE/LNST/VCSH/tăng trưởng ngành (GIỮ NGUYÊN workbook gốc trên Drive)

jobs:
  clear-finance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Clear Finance
        run: |
          python run_headless_update.py --clear-finance

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add Output/

          if ! git diff --cached --quiet; then
            git commit -m "Clear finance: xóa kết quả tính toán ROE/LNST/VCSH ngành $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit. Skipping push."
          fi
