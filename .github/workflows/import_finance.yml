name: Import Finance

on:
  workflow_dispatch: # Nạp dữ liệu VCSH/LNST ban đầu từ CSV người dùng đặt sẵn trên Google Drive

jobs:
  import-finance:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Restore Cached Stock Data
        uses: actions/cache@v3
        with:
          path: |
            data_storage/
            config.json
          key: stock-data-${{ github.run_id }}
          restore-keys: |
            stock-data-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download starter CSV from Drive
        env:
          PYTHONPATH: .
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c '
          import sys
          from tinvest.gdrive_client import list_files_in_folder, download_file_by_name

          files = list_files_in_folder()
          csv_files = [f for f in files if f["name"].lower().endswith(".csv")]
          if not csv_files:
              print("::error::Khong tim thay file CSV nao trong folder Drive. Hay dat file len truoc khi chay Action nay.")
              sys.exit(1)
          csv_files.sort(key=lambda f: f.get("createdTime", ""))
          newest = csv_files[-1]
          print(f">> Chon file moi nhat: {newest[\"name\"]} (createdTime={newest.get(\"createdTime\")})")

          content = download_file_by_name(newest["name"])
          if content is None:
              print("::error::Tai file CSV that bai (kiem tra lai GDRIVE_SERVICE_ACCOUNT_JSON va quyen chia se folder).")
              sys.exit(1)
          with open("finance_import.csv", "wb") as f:
              f.write(content)
          print(">> Da luu finance_import.csv")
          '

      - name: Run Import Finance
        env:
          PYTHONPATH: .
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python run_headless_update.py --import-finance finance_import.csv

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add Output/

          if ! git diff --cached --quiet; then
            echo "📂 Đang sao lưu thư mục Output..."
            mv Output Output_backup

            echo "🔄 Đang cập nhật nhánh main mới nhất từ GitHub..."
            git reset --hard HEAD
            git pull origin main

            echo "📂 Đang phục hồi thư mục Output..."
            rm -rf Output
            mv Output_backup Output

            echo "💾 Đang commit dữ liệu mới..."
            git add Output/
            git commit -m "Import Finance: nạp dữ liệu VCSH/LNST ban đầu $(date +'%Y-%m-%d %H:%M:%S')"

            echo "🚀 Đẩy dữ liệu lên GitHub..."
            git push origin main
          else
            echo "No changes in finance data. Skipping push."
          fi
