name: Update Vietstock Bypass URL

on:
  workflow_dispatch:
    inputs:
      curl_command:
        description: 'Dán cURL command mới để vượt rào Vietstock (Để trống nếu chỉ muốn kiểm tra trạng thái hiện tại)'
        required: false
        default: ''
        type: string

jobs:
  bypass:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Restore Cached Stock Data
        uses: actions/cache@v3
        with:
          path: |
            data_storage/
            config.json
          key: stock-data-${{ github.run_id }}
          restore-keys: |
            stock-data-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process cURL and Update Status
        env:
          PYTHONPATH: .
          INPUT_CURL: ${{ github.event.inputs.curl_command }}
        run: |
          python -c '
          import os
          import json
          from tinvest.config_manager import ConfigManager
          from tinvest.vietstock_client import VietstockClient
          
          # 1. Check existing session
          client = VietstockClient()
          old_status = client.check_session_status()
          print(f"==================================================")
          print(f"Trạng thái kết nối hiện tại trong Cache: {old_status}")
          print(f"==================================================")
          
          new_curl = os.environ.get("INPUT_CURL", "").strip()
          status_to_save = old_status
          
          # 2. Ingest and test new token if provided
          if new_curl and len(new_curl) > 10:
              print("Nhận được cURL mới. Đang cấu hình và kiểm tra...")
              mgr = ConfigManager()
              success = mgr.parse_input(new_curl)
              if success:
                  client.refresh_from_config()
                  new_status = client.check_session_status()
                  print(f"Trạng thái kết nối sau khi cập nhật cURL mới: {new_status}")
                  status_to_save = new_status
                  if new_status in ["VALID", "LIMITED_BYPASSED"]:
                      print("✅ Cập nhật cURL thành công và vượt rào hoạt động tốt!")
                  else:
                      print("⚠️ cURL mới được cập nhật nhưng trạng thái là: " + new_status)
              else:
                  print("❌ Lỗi: Không thể phân tích mã cURL. Cấu hình cũ được giữ nguyên.")
          else:
              print("Không nhận được cURL mới. Chỉ kiểm tra và cập nhật trạng thái kết nối hiện tại.")
          
          # 3. Save connection status directly to analysis_results.json
          output_file = "Output/analysis_results.json"
          if os.path.exists(output_file):
              try:
                  with open(output_file, "r", encoding="utf-8") as f:
                      dashboard_data = json.load(f)
                  
                  dashboard_data["vietstock_status"] = status_to_save
                  
                  with open(output_file, "w", encoding="utf-8") as f:
                      json.dump(dashboard_data, f, ensure_ascii=False, indent=2)
                  print(f"✅ Đã ghi nhận trạng thái kết nối mới ({status_to_save}) vào file kết quả.")
              except Exception as e:
                  print(f"❌ Lỗi cập nhật file kết quả: {e}")
          else:
              print("⚠️ Cảnh báo: Không tìm thấy Output/analysis_results.json")
          '

      - name: Commit and Push Status Change
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Output/
          git add -f config.json
          
          if ! git diff --cached --quiet; then
            echo "📂 Đang sao lưu thư mục Output và config.json..."
            mv Output Output_backup
            cp config.json config_backup.json || true
            
            echo "🔄 Đang cập nhật nhánh main mới nhất từ GitHub..."
            git reset --hard HEAD
            git pull origin main
            
            echo "📂 Đang phục hồi thư mục Output và config.json..."
            rm -rf Output
            mv Output_backup Output
            if [ -f config_backup.json ]; then
              mv config_backup.json config.json
            fi
            
            echo "💾 Đang commit dữ liệu mới..."
            git add Output/
            git add -f config.json
            git commit -m "chore: update vietstock token and connection status"
            
            echo "🚀 Đẩy dữ liệu lên GitHub..."
            git push origin main
          else
            echo "No status change to push."
          fi
