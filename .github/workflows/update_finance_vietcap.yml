name: Update Finance Vietcap

on:
  workflow_dispatch: # Cập nhật quý tài chính mới từ Vietcap cho các mã còn thiếu, tính lại ROE/tăng trưởng ngành

jobs:
  update-finance-vietcap:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Restore Cached Stock Data
        uses: actions/cache@v3
        with:
          path: |
            data_storage/
            config.json
          key: stock-data-${{ github.run_id }}
          restore-keys: |
            stock-data-

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Update Finance Vietcap
        env:
          PYTHONPATH: .
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python run_headless_update.py --update-finance-vietcap

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add Output/

          if ! git diff --cached --quiet; then
            echo "📂 Đang sao lưu thư mục Output..."
            mv Output Output_backup

            echo "🔄 Đang cập nhật nhánh main mới nhất từ GitHub..."
            git reset --hard HEAD
            git pull origin main

            echo "📂 Đang phục hồi thư mục Output..."
            rm -rf Output
            mv Output_backup Output

            echo "💾 Đang commit dữ liệu mới..."
            git add Output/
            git commit -m "Update Finance Vietcap: cập nhật quý tài chính mới $(date +'%Y-%m-%d %H:%M:%S')"

            echo "🚀 Đẩy dữ liệu lên GitHub..."
            git push origin main
          else
            echo "No changes in finance data. Skipping push."
          fi
